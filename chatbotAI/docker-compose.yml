version: "3.8"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: lawwebsite-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/lawwebsite123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: lawwebsite-ai-service
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lawwebsite123
      DATAVBPL_PATH: /data/datavbpl
      VECTOR_STORE_PATH: /data/vector_store
    volumes:
      - ../datavbpl:/data/datavbpl:ro
      - vector_store:/data/vector_store
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  vector_store:
