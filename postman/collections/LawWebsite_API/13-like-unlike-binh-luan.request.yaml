$kind: http-request
name: Like/unlike bình luận
method: POST
url: '{{baseUrl}}/api/comments/like/{{commentId}}'
order: 13000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has message or data", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });
