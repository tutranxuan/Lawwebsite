$kind: http-request
name: Sửa văn bản pháp luật
method: PUT
url: '{{baseUrl}}/api/legal-documents/{{documentId}}'
order: 27000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Luật test (đã cập nhật)",
      "content": "Nội dung văn bản pháp luật đã được cập nhật"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has updated data", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });
