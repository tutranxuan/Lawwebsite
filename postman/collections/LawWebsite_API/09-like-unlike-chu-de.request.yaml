$kind: http-request
name: Like/unlike chủ đề
method: POST
url: '{{baseUrl}}/api/topics/{{topicId}}/like'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has message or data", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });
