$kind: http-request
name: Lấy chi tiết biển báo
method: GET
url: '{{baseUrl}}/api/traffic-signs/{{trafficSignId}}'
order: 33000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has id", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('sign_id');
      });
