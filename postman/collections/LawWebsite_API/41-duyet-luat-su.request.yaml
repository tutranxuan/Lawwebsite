$kind: http-request
name: Duyệt luật sư
method: PUT
url: '{{baseUrl}}/api/lawyers/{{lawyerId}}/approve'
order: 41000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has message or data", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });
