$kind: http-request
name: Gửi câu hỏi cho chatbot
method: POST
url: '{{baseUrl}}/api/chatbot'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "question": "Tốc độ tối đa trong khu dân cư là bao nhiêu?"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has answer", () => {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(val =>
          'answer' in val || 'response' in val || 'message' in val
        );
      });
