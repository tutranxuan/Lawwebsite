$kind: http-request
name: Cập nhật biển báo
method: PUT
url: '{{baseUrl}}/api/traffic-signs/{{trafficSignId}}'
order: 34000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Biển báo cấm đi ngược chiều (đã cập nhật)",
      "description": "Mô tả đã được cập nhật"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has updated data", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an('object');
      });
