$kind: http-request
name: Lấy chi tiết văn bản pháp luật
method: GET
url: '{{baseUrl}}/api/legal-documents/{{documentId}}'
order: 24000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response has id", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('doc_id');
      });
    language: text/javascript
