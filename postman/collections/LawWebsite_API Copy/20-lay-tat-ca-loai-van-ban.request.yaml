$kind: http-request
name: Lấy tất cả loại văn bản
method: GET
url: '{{baseUrl}}/api/document-types'
order: 20000
scripts:
  - type: afterResponse
    language: text/javascript
    code: >-
      pm.test("Status 200", () => pm.response.to.have.status(200));

      pm.test("Response is array or has data", () => {
        const json = pm.response.json();
        pm.expect(json).to.satisfy(val => Array.isArray(val) || (typeof val === 'object' && val !== null && 'data' in val));
      });

      pm.test("Response time < 2000ms", () =>
      pm.expect(pm.response.responseTime).to.be.below(2000));
